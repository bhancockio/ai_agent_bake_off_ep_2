      agents/chat/chat/agent.py, agents/chat/chat/cymbal_agent_wrapper.py, agents/goals_snapshot_agent/goals_snapshot_agent/agent.py,
      agents/goals_snapshot_agent/goals_snapshot_agent/cymbal_agent_wrapper.py, agents/perks_snapshot_agent/perks_snapshot_agent/agent.py,
      agents/perks_snapshot_agent/perks_snapshot_agent/cymbal_agent_wrapper.py, agents/portfolio_snapshot_agent/portfolio_snapshot_agent/agent.py,
      agents/portfolio_snapshot_agent/portfolio_snapshot_agent/cymbal_agent_wrapper.py, agents/spending_snapshot_agent/spending_snapshot_agent/agent.py,
      agents/spending_snapshot_agent/spending_snapshot_agent/cymbal_agent_wrapper.py, refs/a2a_friend_scheduling/host_agent_adk/host/agent.py,
